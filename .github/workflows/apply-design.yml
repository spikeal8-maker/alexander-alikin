name: Apply verified design implementation

on:
  push:
    branches: [agent/site-design-system]
    paths:
      - ".design-apply/**"
      - ".github/workflows/apply-design.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/site-design-system
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply verified source payload
        run: |
          base64 -d .design-apply/payload.b64 > /tmp/design-final.tar.gz
          tar -xzf /tmp/design-final.tar.gz
          rm -rf .design-apply
          rm -f .github/workflows/apply-design.yml
          rm -f .github/workflows/design-snapshot.yml
          printf '%s\n' "verified design payload applied" > .design-applied
      - run: npm ci
      - run: npm run format:write
      - run: npm run quality
      - run: npm run design:static
      - run: npm audit --audit-level=high
      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "design: apply verified editorial-engineering system"
          git push origin HEAD:agent/site-design-system
