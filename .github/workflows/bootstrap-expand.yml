name: Expand foundation package

on:
  workflow_dispatch:
  push:
    branches:
      - agent/foundation-architecture
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap-expand.yml'

permissions:
  contents: write

concurrency:
  group: foundation-expand-${{ github.ref }}
  cancel-in-progress: false

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and validate package
        shell: bash
        run: |
          set -euo pipefail
          test -f .bootstrap/part-000.b64
          test -f .bootstrap/part-001.b64
          test -f .bootstrap/part-002.b64
          cat .bootstrap/part-*.b64 | base64 --decode > /tmp/alexander-alikin-foundation.tar.gz
          tar -tzf /tmp/alexander-alikin-foundation.tar.gz > /tmp/package-files.txt
          test -s /tmp/package-files.txt
          if grep -Eq '(^|/)\.git(/|$)' /tmp/package-files.txt; then
            echo 'Package must not contain .git paths.' >&2
            exit 1
          fi

      - name: Expand repository foundation
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/alexander-alikin-foundation.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-expand.yml

      - name: Commit expanded foundation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'feat: establish personal media platform foundation'
          git push
