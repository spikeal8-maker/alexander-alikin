name: Debug Quality V2

on:
  pull_request:
    branches:
      - agent/site-design-system

permissions:
  contents: read

jobs:
  debug-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture quality output
        id: quality
        shell: bash
        run: |
          set +e
          npm run quality 2>&1 | tee quality.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: quality.log
          retention-days: 1
      - name: Preserve failure result
        if: steps.quality.outputs.status != '0'
        run: exit 1
