name: Format V2 Branch

on:
  push:
    branches:
      - agent/integrate-visual-direction-v2-1

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/integrate-visual-direction-v2-1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:write
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src scripts
          git commit -m "style: format complete V2 layout"
          git push origin HEAD:agent/integrate-visual-direction-v2-1
