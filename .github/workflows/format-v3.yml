name: Format V3 Homepage

on:
  push:
    branches:
      - agent/editorial-visual-restart-v3

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/editorial-visual-restart-v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:write
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189822+github-actions[bot]@users.noreply.github.com"
          git add src scripts
          git commit -m "style: format final V3 browser fixes"
          git push origin HEAD:agent/editorial-visual-restart-v3
