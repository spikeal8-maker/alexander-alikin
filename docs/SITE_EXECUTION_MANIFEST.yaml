design:
  concept: "Интеллектуальный редакционный журнал + инженерная мастерская"
  colors:
    background: "#F6F2EA"
    surface: "#FFFEFB"
    text: "#1C252D"
    primary: "#173B57"
    accent: "#A8582D"
    muted: "#5D6B75"
    border: "#D8D0C4"
    verified: "#2F6B57"
    warning: "#8B5A20"
    danger: "#8A3D3D"
  required_media:
    - "real_vertical_portrait"
    - "real_working_portrait"
    - "project_photo"
    - "teaching_or_speaking_photo"
    - "approved_archive_photos"
  forbidden_primary_patterns:
    - "generated_face"
    - "neon_ai_agency"
    - "robot_stock_image"
    - "obsidian_graph_in_hero"
    - "autoplay_background_video"
    - "unsupported_metric_counters"

content_launch_package:
