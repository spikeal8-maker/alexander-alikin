version: 1
updated_at: "2026-07-19"
project:
  id: "alexander-alikin-personal-platform"
  title: "Александр Аликин — персональная цифровая платформа"
  public_repository: "spikeal8-maker/alexander-alikin"
  private_repository: "spikeal8-maker/alexander-alikin-vault"
  epic_url: "https://github.com/spikeal8-maker/alexander-alikin/issues/5"
  foundation_pr_url: "https://github.com/spikeal8-maker/alexander-alikin/pull/1"
  production_branch: "main"
  publication_rule: "main соответствует опубликованной версии; private vault не подключается к production"

objective:
  primary: "Создавать качественные предметные разговоры через проверяемую цифровую личность Александра"
  identity_result: "Человек из поиска понимает, кто такой Александр, чем занимается сейчас и почему ему можно доверять"
  commercial_result: "Владелец бизнеса или руководитель образования находит релевантное доказательство и начинает контекстный разговор"
  media_result: "Читатель находит самостоятельные мысли, истории и проекты и получает причину возвращаться"

positioning:
  professional: "Александр Аликин — предприниматель-практик и инженер-педагог, который проектирует и запускает технологические, ИИ- и образовательные системы"
  human: "Разбираю сложные задачи, собираю работающие конструкции, проверяю их практикой и объясняю людям, как ими пользоваться"
  differentiation:
    - "инженерная ответственность: архитектура, ограничения, проверка"
    - "педагогическая ответственность: объяснение, обучение, воспроизводимость"
    - "предпринимательская ответственность: спрос, экономика, команда, последствия"

navigation:
  primary:
    - label: "Обо мне"
      path: "/about/"
    - label: "Проекты"
      path: "/projects/"
    - label: "Бизнесу"
      path: "/business/"
    - label: "Образованию"
      path: "/education/"
    - label: "Журнал"
      path: "/journal/"
    - label: "Обсудить задачу"
      path: "/collaboration/"
      kind: "primary_cta"
  utility:
    - label: "Сейчас"
      path: "/now/"
    - label: "Как я мыслю"
      path: "/second-brain/"
    - label: "Факты и источники"
      path: "/facts/"
    - label: "Для СМИ"
      path: "/press/"
    - label: "Контакты"
      path: "/contacts/"
    - label: "Поиск"
      path: "/search/"
    - label: "Конфиденциальность"
      path: "/privacy/"

routes:
  - path: "/"
    audience: "all_new_visitors"
    question: "Кто такой Александр и куда перейти дальше?"
    primary_cta: "Обсудить задачу"
    success_event: "home_route_select_or_primary_cta"
  - path: "/about/"
    audience: "identity_search"
    question: "Как связаны роли и этапы Александра?"
    primary_cta: "Посмотреть проекты"
    success_event: "identity_to_project"
  - path: "/business/"
    audience: "business_owner"
    question: "Можно ли разобрать мой процесс и создать измеримый пилот?"
    primary_cta: "Описать процесс для разбора"
    success_event: "business_brief_submit"
  - path: "/education/"
    audience: "education_leader"
    question: "Можно ли внедрить программу или лабораторию с видимым результатом?"
    primary_cta: "Обсудить программу или лабораторию"
    success_event: "education_brief_submit"
  - path: "/projects/"
    audience: "proof_and_partnership"
    question: "Что Александр реально создавал и какую роль выполнял?"
    primary_cta: "Открыть релевантный проект"
    success_event: "project_open"
  - path: "/journal/"
    audience: "reader"
    question: "Есть ли здесь самостоятельные мысли и материалы?"
    primary_cta: "Читать связанный материал"
    success_event: "second_content_view"
  - path: "/press/"
    audience: "press_and_events"
    question: "Можно ли быстро проверить факты и получить материалы?"
    primary_cta: "Запросить комментарий или выступление"
    success_event: "press_request_submit"

