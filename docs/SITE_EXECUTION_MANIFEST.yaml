objective:
  primary: "Создавать качественные предметные разговоры через проверяемую цифровую личность Александра"
  identity_result: "Человек из поиска понимает, кто такой Александр, чем занимается сейчас и почему ему можно доверять"
  commercial_result: "Владелец бизнеса или руководитель образования находит релевантное доказательство и начинает контекстный разговор"
  media_result: "Читатель находит самостоятельные мысли, истории и проекты и получает причину возвращаться"

positioning:
  professional: "Александр Аликин — предприниматель-практик и инженер-педагог, который проектирует и запускает технологические, ИИ- и образовательные системы"
  human: "Разбираю сложные задачи, собираю работающие конструкции, проверяю их практикой и объясняю людям, как ими пользоваться"
  differentiation:
    - "инженерная ответственность: архитектура, ограничения, проверка"
    - "педагогическая ответственность: объяснение, обучение, воспроизводимость"
    - "предпринимательская ответственность: спрос, экономика, команда, последствия"

